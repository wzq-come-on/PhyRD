seed: 42
device: cuda:0
stage: residual
data:
  root: /test1/wzq/data/sevir
  split: train
  max_samples: null
  input_frames: 13
  output_frames: 12
  window_start_index: 12
  model_resolution: 128
  spatial_preprocess: diffcast_bilinear
  batch_size: 32
  num_workers: 4
model:
  base_channels: 64
  diffusion_steps: 100
  freeze_deterministic: true
  deterministic_checkpoint: artifacts/experiments/phyrd_sdir_13to12_ddp8_seed42/deterministic/checkpoint_best.pt
  deterministic:
    name: sdir_official
    params:
      patch_size: 8
      hidden_size: 512
      num_heads: 4
      depth: 8
      frequency_stride: 16
      curriculum_alpha: 1.0
      curriculum_beta: 3.0
      pcpsd_weight: 0.01
      model_resolution: 128
optimization:
  learning_rate: 0.0001
  weight_decay: 0.00001
  max_epochs: 100
  log_every: 10
  precision: bf16
validation:
  enabled: true
  split: val_model
  every_epochs: 10
physics:
  enabled: true
  robust_scale: 0.05
  tolerance: 0.1
  gamma_nadv: 1.0
  pool_sizes: [8, 16, 32]
  alpha_mass: 0.25
  lambda_train: 0.01
artifacts:
  directory: artifacts/experiments/phyrd_sdir_13to12_ddp8_seed42/residual
